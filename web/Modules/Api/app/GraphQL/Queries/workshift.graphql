extend type Query {
    workshift_list(
        page: Int
        limit: Int
        filter: String
        sort_by: String
        order: String
        version: String!
        platform: String!
    ): WorkshiftListResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkshiftResolver@listWorkshift"
        )

    workshift_view(
        workshift_id: Int!
        version: String!
        platform: String!
    ): WorkshiftResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkshiftResolver@viewWorkshift"
        )
}

type WorkshiftListResponse {
    status: Int!
    message: String!
    data: [Workshift]
    paginatorInfo: PaginatorInfo
}

type WorkshiftResponse {
    status: Int!
    message: String!
    data: Workshift
}

