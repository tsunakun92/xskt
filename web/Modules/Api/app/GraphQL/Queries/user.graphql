extend type Query {
    user_view(user_id: ID!, version: String!, platform: String!): UserViewResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@viewUser"
        )

    user_permissions(
        user_id: ID!
        version: String!
        platform: String!
    ): UserPermissionsResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@getUserPermissions"
        )

    user_data(version: String!, platform: String!): UserDataResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@getUserData"
        )

    user_list(
        page: Int
        limit: Int
        filter: String
        sort_by: String
        order: String
        version: String!
        platform: String!
    ): UserListResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@listUsers"
        )
}

type UserViewResponse {
    status: Int!
    message: String!
    data: User
}

type UserPermissionsResponse {
    status: Int!
    message: String!
    data: [MobilePermission!]
}

type UserDataResponse {
    status: Int!
    message: String!
    data: UserData
}

type UserListResponse {
    status: Int!
    message: String!
    data: [User]
    paginatorInfo: PaginatorInfo
}

