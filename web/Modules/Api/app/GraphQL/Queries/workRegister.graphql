extend type Query {
    work_register_list(
        employee_id: Int
        group_id: Int
        shift_id: Int
        start_date: String
        end_date: String
        page: Int
        limit: Int
        filter: String
        sort_by: String
        order: String
        version: String!
        platform: String!
    ): WorkRegisterListResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkRegisterResolver@listWorkRegister"
        )

    work_register_view(
        work_register_id: Int!
        version: String!
        platform: String!
    ): WorkRegisterResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkRegisterResolver@viewWorkRegister"
        )
}

type WorkRegisterListResponse {
    status: Int!
    message: String!
    data: [WorkRegister!]
    paginatorInfo: PaginatorInfo
}

type WorkRegisterResponse {
    status: Int!
    message: String!
    data: WorkRegister
}

