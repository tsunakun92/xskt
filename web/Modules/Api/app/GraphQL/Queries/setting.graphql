extend type Query {
    setting_list(
        page: Int
        limit: Int
        filter: String
        sort_by: String
        order: String
        user_flag: Int
        version: String!
        platform: String!
    ): SettingListResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingResolver@settingList"
        )

    setting_view(
        setting_key: String!
        version: String!
        platform: String!
    ): SettingViewResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingResolver@settingView"
        )

    setting_by_user(
        user_id: ID!
        version: String!
        platform: String!
    ): SettingByUserResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingResolver@settingByUser"
        )
}

type SettingListResponse {
    status: Int!
    message: String!
    data: [Setting]
    paginatorInfo: PaginatorInfo
}

type SettingViewResponse {
    status: Int!
    message: String!
    data: Setting
}

type SettingByUserResponse {
    status: Int!
    message: String!
    data: Config
}

