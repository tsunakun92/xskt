extend type Query {
    customer_booking_info(
        booking_id: Int!
        version: String!
        platform: String!
    ): CustomerBookingInfoResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\CustomerBookingInfoResolver@info"
        )
}

type CustomerBookingInfoResponse {
    status: Int!
    message: String!
    data: Booking
}

type Booking {
    id: ID!
    code: String
    status: Int
    start: String
    end: String
    check_in_at: String
    check_out_at: String
    guest_count: GuestCount
    total_price: Float
    deposit_amount: Float
    special_requests: String
    cancel_reason: String
    customer: Customer @belongsTo(relation: "rCustomer")
    section: Section @belongsTo(relation: "rSection")
    booking_details: [BookingDetail] @hasMany(relation: "rBookingDetails")
    payments: [Payment] @hasMany(relation: "rPayments")
}

type GuestCount {
    adults: Int
    children: Int
}

type BookingDetail {
    id: ID!
    room_type: RoomType @belongsTo(relation: "rRoomType")
    room_count: Int
    guest_count: GuestCount
    price_per_night: Float
    total_price: Float
    notes: String
    assigned_rooms: [Room] @belongsToMany(relation: "rAssignedRooms")
}

type Payment {
    id: ID!
    method_name: String
    total: Float
    tax: Float
    discount: Float
    final: Float
    status: Int
    created_at: String
}
