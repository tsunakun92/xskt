type Section {
    id: ID!
    name: String!
    code: String!
    address: String
    postal_code: String
    ward: String
    chome: String
    ban: String
    go: String
    building: String
    room: String
    address_line: String
    latitude: Float
    longitude: Float
    rating_value: Float
    description: String
    google_place_id: String
    google_map_url: String
    phone: String
    email: String
    website: String
    check_in_time: String
    check_out_time: String
    company_id: Int
    type_id: Int
    status: Int!
    min_price: Float @field(resolver: "Modules\\Api\\GraphQL\\Resolvers\\SectionResolver@minPrice")
    company: Company @belongsTo(relation: "rCompany")
    room_types: [RoomType!]! @hasMany(relation: "rRoomTypes")
    images: [Image!]! @field(resolver: "Modules\\Api\\GraphQL\\Resolvers\\SectionResolver@images")
}

