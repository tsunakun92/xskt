type Customer {
    id: ID!
    user_id: Int
    name: String
    first_name: String
    last_name: String
    phone_number: String
    code: String
    address: String
    postal_code: String
    birthday: String
    gender: Int
    gender_name: String
    type: Int
    type_name: String
    status: Int
    user: User! @belongsTo(relation: "rUser")
}


