extend type Mutation {
    customer_booking_payment(
        booking_id: Int!
        version: String!
        platform: String!
    ): CustomerBookingPaymentResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\CustomerBookingPaymentResolver@pay"
        )
}

type CustomerBookingPaymentResponse {
    status: Int!
    message: String!
    data: Booking
}


