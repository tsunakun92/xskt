extend type Mutation {
    setting_create(
        key: String!
        value: String!
        description: String
        user_flag: Int
        version: String!
        platform: String!
    ): SettingCreateResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingMutationResolver@settingCreate"
        )

    setting_update(
        key: String!
        value: String!
        description: String
        user_flag: Int
        version: String!
        platform: String!
    ): SettingUpdateResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingMutationResolver@settingUpdate"
        )

    setting_delete(
        key: String!
        version: String!
        platform: String!
    ): SettingDeleteResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SettingMutationResolver@settingDelete"
        )
}

type SettingCreateResponse {
    status: Int!
    message: String!
    data: Setting
}

type SettingUpdateResponse {
    status: Int!
    message: String!
    data: Setting
}

type SettingDeleteResponse {
    status: Int!
    message: String!
}

