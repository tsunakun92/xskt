extend type Mutation {
    workshift_create(
        code: String
        name: String!
        description: String!
        start: String!
        end: String!
        company_id: Int!
        role_id: Int!
        max_employee_cnt: Int!
        color: String!
        version: String!
        platform: String!
    ): WorkshiftResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkshiftResolver@createWorkshift"
        )

    workshift_update(
        workshift_id: Int!
        code: String
        name: String
        description: String
        start: String
        end: String
        company_id: Int
        role_id: Int
        max_employee_cnt: Int
        color: String
        status: Int
        version: String!
        platform: String!
    ): WorkshiftResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkshiftResolver@updateWorkshift"
        )

    workshift_delete(
        workshift_id: Int!
        version: String!
        platform: String!
    ): WorkshiftResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\WorkshiftResolver@deleteWorkshift"
        )
}

type WorkshiftResponse {
    status: Int!
    message: String!
    data: Workshift
}

