extend type Mutation {
    verify_register_otp(
        email: String!
        otp: String!
        device_token: String!
        version: String!
        platform: String!
    ): VerifyRegisterOtpResponse!
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\RegisterVerifyResolver@verify"
        )
}

type VerifyRegisterOtpResponse {
    status: Int!
    message: String!
    token: String
    data: UserData
}
