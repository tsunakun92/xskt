extend type Mutation {
    user_create(
        username: String!
        email: String!
        password: String!
        role_id: Int!
        fullname: String!
        birthday: String
        address: String
        gender: Int
        company_id: Int
        version: String!
        platform: String!
    ): UserResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@createUser"
        )

    user_update(
        user_id: Int!
        username: String
        email: String
        password: String
        role_id: Int
        fullname: String
        birthday: String
        address: String
        gender: String
        company_id: Int
        version: String!
        platform: String!
    ): UserResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@updateUser"
        )

    user_delete(
        user_id: Int!
        version: String!
        platform: String!
    ): UserDeleteResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\UserResolver@deleteUser"
        )
}

type UserResponse {
    status: Int!
    message: String!
    data: User
}

type UserDeleteResponse {
    status: Int!
    message: String!
}

