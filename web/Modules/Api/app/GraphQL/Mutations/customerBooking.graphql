extend type Mutation {
    customer_booking_create(
        section_id: Int!
        start: String!
        end: String!
        booking_details: [CustomerBookingCreateDetailInput!]!
        guest_count: GuestCountInput
        deposit_amount: Float
        special_requests: String
        notes: String
        version: String!
        platform: String!
    ): CustomerBookingResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\CustomerBookingCreateResolver@create"
        )
}

input CustomerBookingCreateDetailInput {
    room_type_id: Int!
    room_count: Int!
    guest_count: GuestCountInput!
    price_per_night: Float
    total_price: Float
    notes: String
}

input GuestCountInput {
    adults: Int
    children: Int
}

type CustomerBookingResponse {
    status: Int!
    message: String!
    data: Booking
}
