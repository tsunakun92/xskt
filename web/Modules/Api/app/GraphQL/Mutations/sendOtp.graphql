extend type Mutation {
    send_otp(
        email: String!
        type: Int!
        version: String!
        platform: String!
    ): SendOtpResponse
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\SendOtpResolver@sendOtp"
        )
}

type SendOtpResponse {
    status: Int!
    message: String!
    expires_in_minutes: Int
}


