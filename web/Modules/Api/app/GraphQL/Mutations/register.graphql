extend type Mutation {
    register_customer_with_email(
        email: String!
        password: String!
        version: String!
        platform: String!
    ): RegisterResponse!
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\RegisterResolver@register"
        )
}

type RegisterResponse {
    status: Int!
    message: String!
    expires_in_minutes: Int
}
