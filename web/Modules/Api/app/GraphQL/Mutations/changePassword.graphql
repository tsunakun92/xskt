extend type Mutation {
    change_password(
        current_password: String!
        new_password: String!
        version: String!
        platform: String!
    ): ChangePasswordResponse
        @guard
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\ChangePasswordResolver@changePassword"
        )
}

type ChangePasswordResponse {
    status: Int!
    message: String!
}

