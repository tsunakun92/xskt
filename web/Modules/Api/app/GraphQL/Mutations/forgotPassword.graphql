extend type Mutation {
    forgot_password(
        email: String!
        new_pass: String!
        otp: String!
        version: String!
        platform: String!
    ): ForgotPasswordResponse
        @field(
            resolver: "Modules\\Api\\GraphQL\\Resolvers\\ForgotPasswordResolver@forgotPassword"
        )
}

type ForgotPasswordResponse {
    status: Int!
    message: String!
}
